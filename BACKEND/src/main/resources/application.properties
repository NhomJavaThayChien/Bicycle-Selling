spring.application.name=old-bicycle-selling

# ============ Neon Cloud PostgreSQL Configuration ============
# Thêm charSet=UTF-8 vào URL
spring.datasource.url=jdbc:postgresql://ep-lucky-leaf-a1o22bai-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&charSet=UTF-8
spring.datasource.username=neondb_owner
spring.datasource.password=npg_LrQCn0iWzmE8
spring.datasource.driver-class-name=org.postgresql.Driver

# ============ JPA / Hibernate ============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============ Data Seeding ============
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# Dòng cực kỳ quan trọng để sửa lỗi tiếng Việt
spring.sql.init.encoding=UTF-8

# ============ Server / Integrations ============
server.port=8080
gemini.api.key=REPLACE_WITH_GEMINI_API_KEY
stripe.api.key=sk_test_...
success.url=http://localhost:3000/payment/success
cancel.url=http://localhost:3000/payment/cancel
ghn.api.token=...

# ============ JWT Configuration ============
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
jwt.expiration=86400000

# ============ Swagger/OpenAPI Configuration ============
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============ File Upload Configuration ============
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads/images
file.max-size=10485760

# ============ Logging Configuration ============
logging.level.org.springframework.security=DEBUG
logging.level.com.bicycle.selling=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
